# INFO DEL USUARIO
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = JetBrains Mono Nerd
    position = 0, 120
    halign = center
    valign = center
}

# ESTADO SISTEMA (uptime)
label {
    monitor =
    text = cmd[update:30000] echo "Activo $(uptime -p)"
    color = rgba(255, 255, 255, 0.5)
    font_size = 14
    font_family = JetBrains Mono Nerd
    position = 0, 200
    halign = center
    valign = center
}

# ANIMACIÓN FADE-IN
animation = fadeIn, 1, 2, ease-out
