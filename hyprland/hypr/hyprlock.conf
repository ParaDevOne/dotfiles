general {
    no_fade_in = false              # Fade-in suave (false = activado)
    grace = 0                       # Sin margen de gracia
    disable_loading_bar = false     # Mostrar barra de carga
}

# FONDO: Imagen con blur + ajustes de color
background {
    monitor =                       # Todos los monitores
    path = ~/Pictures/Wallpapers/wallpaper.jpg # CAMBIA ESTO a tu fondo
    blur_passes = 3                 # Niveles de blur
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# HORA: Grande y centrada
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 0.95)
    font_size = 120
    font_family = JetBrains Mono Nerd Bold
    position = 0, -200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# FECHA
label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 24
    font_family = JetBrains Mono Nerd
    position = 0, -100
    halign = center
    valign = center
}

# CAJA DE INPUT (Contraseña)
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    dots_size = 0.2                 # Tamaño de puntos
    dots_spacing = 0.15             # Espaciado
    dots_center = true
    outer_color = rgba(0, 0, 0, 0.3)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = true
    placeholder_text = <i>Contraseña</i> # Texto placeholder
    hide_input = true
    rounding = -1                   # Bordes redondos
    check_color = rgb(150, 150, 150)
    fail_color = rgb(204, 34, 34)   # Rojo para fallos
    fail_text = <i>$ATTEMPTS intento(s)</i>
    capslock_color = rgb(255, 204, 0)
    position = 0, 50
    halign = center
    valign = center
    shadow_passes = 2
    shadow_color = rgba(0, 0, 0, 0.6)
}

