################
### WINDOWS ###
###############

group {
    col.border_active = $blue
    col.border_inactive = $surface1
}

#############
### THEME ###
#############

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = easeInOutQuad, 0.45, 0, 0.55, 1

    animation = windows, 1, 7, myBezier
    animation = windowsIn, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = windowsMove, 1, 5, myBezier

    animation = fade, 1, 7, default
    animation = fadeIn, 1, 5, default
    animation = fadeOut, 1, 5, default

    animation = workspaces, 1, 6, easeInOutQuad
    animation = border, 1, 10, default
}

decoration {
    rounding = 9
    rounding_power = 4.0
    dim_inactive = true
    dim_strength = 0.2

    active_opacity = 1.0
    inactive_opacity = 0.85

    blur {
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        special = true
    }

    shadow {
        enabled = true
        range = 6
        render_power = 2
        color = rgba(1a1a1aee)
    }
}
