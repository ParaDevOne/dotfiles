general {
    lock_cmd = pidof hyprlock || hyprlock        # Evita múltiples instancias
    unlock_cmd = loginctl unlock-session          # Desbloquear sesión
    before_sleep_cmd = loginctl lock-session      # Bloquear antes de dormir
    after_sleep_cmd = hyprctl dispatch dpms on    # Pantalla ON después de despertar
    ignore_dbus_inhibit = false                   # Respeta inhibidores dbus (Firefox, Steam)
    ignore_systemd_inhibit = false                # Respeta inhibidores systemd
}

# ADVERTENCIA: 5 minutos
listener {
    timeout = 300
    on-timeout = notify-send "⚠️ Aviso" "Te bloquearás en 5 minutos"
    on-resume = notify-send "✓ Actividad detectada"
}

# ADVERTENCIA: 1 minuto
listener {
    timeout = 540
    on-timeout = notify-send "⛔ Crítico" "Te bloquearás en 60 segundos"
    on-resume = notify-send "✓ Actividad detectada"
}

# BLOQUEO: 10 minutos
listener {
    timeout = 600
    on-timeout = hyprlock
}

# APAGAR PANTALLA: 15 minutos (sin bloquear aún)
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# SUSPENDER: 30 minutos (nuke total)
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
