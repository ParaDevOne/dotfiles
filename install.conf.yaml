- defaults:
    link:
      relink: true
      create: true
      relative: true
      force: false

- clean:
    '~':
      recursive: false
    '~/.config':
      recursive: true

- create:
    - ~/.cache/zsh
    - ~/.local/share/zsh

##########
#  Home  #
##########
- link:
    ~/.zshenv:   { path: home/zshenv }
    ~/.gitconfig: { path: home/gitconfig }

##########
#  Dots  #
##########
- link:
    ~/.config/Code/User/settings.json: { path: dots/code/settings.json }
    ~/.config/kitty:                   { path: dots/kitty }

#############
#  Hyprland #
#############
- link:
    ~/.config/hypr:         { path: hyprland/hypr }
    ~/.config/waybar:       { path: hyprland/waybar }
    ~/.config/mako:         { path: hyprland/mako }
    ~/.config/wlogout:      { path: hyprland/wlogout }
    ~/.config/rofi:         { path: hyprland/rofi }

##########
# System #
##########
- link:
    ~/.config/environment.d: { path: system/environment.d }
    ~/.config/paru:           { path: system/paru }

#########
# Shell #
#########
- link:
    ~/.config/nvim:      { path: shell/nvim }
    ~/.config/bat:       { path: shell/bat }
    ~/.config/fastfetch: { path: shell/fastfetch }

#######
# Zsh #
#######
- link:
    ~/.config/zsh/.zshrc:         { path: shell/zsh/zshrc }
    ~/.config/zsh/.zprofile:      { path: shell/zsh/zprofile }
    ~/.config/zsh/theme.zsh:      { path: shell/zsh/theme.zsh }
    ~/.config/zsh/aliases.zsh:    { path: shell/zsh/aliases.zsh }
    ~/.config/zsh/keybinds.zsh:   { path: shell/zsh/keybinds.zsh }
    ~/.config/zsh/functions.zsh:  { path: shell/zsh/functions.zsh }
    ~/.config/zsh/.zsh_plugins.txt: { path: shell/zsh/zsh_plugins.txt }
    ~/.config/fastfetch:
        path: dots/fastfetch
    # Zsh
    ~/.config/zsh/.zshrc:
        path: shell/zsh/zshrc
    ~/.config/zsh/.zprofile:
        path: shell/zsh/zprofile
    ~/.config/zsh/theme.zsh:
        path: shell/zsh/theme.zsh
    ~/.config/zsh/aliases.zsh:
        path: shell/zsh/aliases.zsh
    ~/.config/zsh/keybinds.zsh:
        path: shell/zsh/keybinds.zsh
    ~/.config/zsh/functions.zsh:
        path: shell/zsh/functions.zsh
    ~/.config/zsh/.zsh_plugins.txt:
        path: shell/zsh/zsh_plugins.txt
