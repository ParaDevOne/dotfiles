# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = """[¯éÂ](color_orange)\
os.symbol\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[¯é░](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$java\
$python\
[¯é░](fg:color_blue bg:color_bg3)\
[¯é░](fg:color_bg3 bg:color_bg1)\
[¯é┤ ](fg:color_bg1)\
$line_break$character"""

[package]
symbol = "¾░Åù "

[os.symbols]
Arch = "´îâ "
Manjaro = "´îÆ "
Linux = "´îÜ "

palette = 'palette'

[palettes.palette]
color_fg0    = '#fbf1c7'
color_bg1    = '#3c3836'
color_bg3    = '#665c54'
color_blue   = '#458588'
color_aqua   = '#689d6a'
color_green  = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red    = '#cc241d'
color_yellow = '#d79921'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "¯ÿØ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "¯ëû"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[line_break]
disabled = false

# Replace the 'ÔØ»' symbol in the prompt with 'Ô×£'
[character] # The name of the module we are configuring is 'character'
disabled = false
success_symbol = '[´É▓](bold fg:color_green)' # The 'success_symbol' segment is being set to 'Ô×£' with the color 'bold green'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[´É┤](bold fg:color_yellow)'