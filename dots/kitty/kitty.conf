# Theme & keybindings
include ./theme.conf
include ./keybindings.conf

# Fonts & text rendering

font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrainsMono Nerd Font Mono Bold
italic_font      JetBrainsMono Nerd Font Mono Italic
bold_italic_font JetBrainsMono Nerd Font Mono Bold Italic
font_size        13.0
line_height 1.2

# Ligatures enhancement for coding
box_drawing_scale 0.001, 1, 1.5, 2
disable_ligatures never
font_features JetBrainsMonoNFM-Regular +zero +ss01 +cv14

# Letter spacing and padding
letter_spacing 0.0
line_height    1.1

# Rendering quality & performance tweaks
repaint_delay   5
input_delay     1
sync_to_monitor yes

# Window & tab appearance

remember_window_size  no
initial_window_width  640
initial_window_height 480
background_opacity    0.50

window_border_width  0
window_margin_width  0
window_margin_height 5

window_padding_width       12
window_padding_height      4
single_window_margin_width 0

resize_debounce_time 0.01
resize_in_steps      no

tab_bar_edge            top
tab_bar_style           fade
tab_separator           ""
tab_bar_align left
tab_bar_min_tabs 2
tab_bar_margin_width    9.0
tab_bar_margin_height   9.0 0.0
tab_powerline_style slanted
tab_title_template "{fmt.fg.red}{activity_symbol}{fmt.fg.tab}{index}:{title}"

tab_switch_strategy previous
tab_fade 0.5 0.75 1
tab_separator " ┇"
active_tab_font_style   bold
inactive_tab_font_style normal

hide_window_decorations no

enabled_layouts splits,stack,tall,fat,grid,horizontal,vertical
window_resize_step_cells 2
window_resize_step_lines 2

# Cursor & selection appearance

cursor_shape               beam
cursor_beam_thickness      2.0
cursor_blink_interval      0.5
cursor_stop_blinking_after 15.0

copy_on_select clipboard
strip_trailing_spaces smart
click_interval 0.5

# Scrollback & history

scrollback_lines 50000
scrollback_pager_history_size 100
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_fill_enlarged_window yes

scrollbar_handle_opacity       0
scrollbar_track_opacity        0
scrollbar_track_hover_opacity  0

# Mouse & URL handling

detect_urls yes
url_color #61afef
url_style curly
open_url_with default

mouse_hide_wait 2.0
focus_follows_mouse no

select_by_word_characters @-./_~?&=%+#
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map ctrl+left click ungrabbed mouse_handle_click link

# Performance & rendering

sync_to_monitor yes
draw_minimal_borders yes

# Shell integration & remote control

update_check_interval 0
shell zsh
confirm_os_window_close    0
allow_remote_control       yes
listen_on unix:/tmp/kitty

# Audio & bell settings

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no

# Advanced settings & tweaks

window_alert_priority high
action_deferred_fonts_threshold 0

# Allow hyperlinks
allow_hyperlinks yes

# Dynamic background opacity toggle
dynamic_background_opacity yes

background_blur 1
